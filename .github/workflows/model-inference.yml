name: BioImage.IO Model Inference

on:
  schedule:
    # Run daily at 2:00 AM UTC (offset from model testing)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      model_ids:
        description: 'Specific model IDs to test (comma-separated, leave empty for all)'
        required: false
        type: string
      skip_cache:
        description: 'Skip cache during inference checks'
        required: false
        default: false
        type: boolean

jobs:
  test-bioimageio-model-inference:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-inference-v1
        restore-keys: |
          ${{ runner.os }}-pip-inference-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hypha-rpc numpy httpx pyyaml

    - name: Create test reports directory
      run: mkdir -p bioimageio_test_reports

    - name: Run BioImage.IO model inference checks
      env:
        HYPHA_TOKEN: ${{ secrets.HYPHA_TOKEN }}
      run: |
        cd scripts

        # Set safe defaults for inputs (handle scheduled runs)
        MODEL_IDS="${{ github.event.inputs.model_ids || '' }}"
        SKIP_CACHE="${{ github.event.inputs.skip_cache || 'false' }}"

        # Build command arguments
        ARGS=""

        if [ -n "$MODEL_IDS" ]; then
          MODEL_IDS_SPACE=$(echo "$MODEL_IDS" | tr ',' ' ')
          ARGS="$ARGS --model-ids $MODEL_IDS_SPACE"
        fi

        if [ "$SKIP_CACHE" = "true" ]; then
          ARGS="$ARGS --skip-cache"
        fi

        echo "Running: python -u bioengine_model_infer.py $ARGS"
        python -u bioengine_model_infer.py $ARGS
        EXIT_CODE=$?

        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ Model inference checks failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Generate inference summary report
      if: always()
      run: |
        echo "# BioImage.IO Inference Check Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        cd scripts
        ANALYSIS_OUTPUT=$(python -u bioengine_model_infer.py --analyze-results)
        echo "$ANALYSIS_OUTPUT"

        eval "$ANALYSIS_OUTPUT"

        if [ "$TOTAL_MODELS" -gt 0 ]; then
          echo "**Total models in scope:** $TOTAL_MODELS" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed model-runner version:** ${RUNNER_VERSION:-unknown}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Inference Result | Count | Total | Rate |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|-------|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED | $TOTAL_MODELS | ${PASSED_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED | $TOTAL_MODELS | ${FAILED_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Timeout | $TIMEOUT | $TOTAL_MODELS | ${TIMEOUT_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Passed includes skipped models that were already previously passed." >> $GITHUB_STEP_SUMMARY
          echo "Timeouts are included in the failed count." >> $GITHUB_STEP_SUMMARY
          echo "Cached results from a previous runner version are re-tested when the runner version is known and differs from the stored stamp; entries without a stored stamp are also re-tested once the current runner version is known so they pick one up." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Inference check completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        else
          echo "No inference summary report found." >> $GITHUB_STEP_SUMMARY
        fi

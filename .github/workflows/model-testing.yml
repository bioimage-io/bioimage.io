name: BioImage.IO Model Testing

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      model_ids:
        description: 'Specific model IDs to test (comma-separated, leave empty for all)'
        required: false
        type: string
      dry_run:
        description: "Run in dry-run mode (don't update artifacts)"
        required: false
        default: false
        type: boolean
      skip_cache:
        description: 'Skip cache during model testing'
        required: false
        default: false
        type: boolean

jobs:
  test-bioimageio-models:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hypha-rpc numpy httpx pydantic

    - name: Create test reports directory
      run: mkdir -p bioimageio_test_reports

    - name: Run BioImage.IO model tests
      env:
        HYPHA_TOKEN: ${{ secrets.HYPHA_TOKEN }}
      run: |
        cd scripts

        # Set safe defaults for inputs (handle scheduled runs)
        MODEL_IDS="${{ github.event.inputs.model_ids || '' }}"
        DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
        SKIP_CACHE="${{ github.event.inputs.skip_cache || 'false' }}"

        # Build command arguments
        ARGS=""

        if [ -n "$MODEL_IDS" ]; then
          MODEL_IDS_SPACE=$(echo "$MODEL_IDS" | tr ',' ' ')
          ARGS="$ARGS --model-ids $MODEL_IDS_SPACE"
        fi

        if [ "$DRY_RUN" = "true" ]; then
          ARGS="$ARGS --dry-run"
        fi

        if [ "$SKIP_CACHE" = "true" ]; then
          ARGS="$ARGS --skip-cache"
        fi

        echo "Running: python -u bioengine_model_test.py $ARGS"
        python -u bioengine_model_test.py $ARGS
        EXIT_CODE=$?

        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ Model testing failed with exit code $EXIT_CODE"
          exit $EXIT_CODE
        fi

    - name: Upload test reports as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bioimageio-test-reports-${{ github.run_number }}
        path: bioimageio_test_reports/
        retention-days: 30

    - name: Generate summary report
      if: always()
      run: |
        echo "# BioImage.IO Test Reports Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        cd scripts
        ANALYSIS_OUTPUT=$(python -u bioengine_model_test.py --analyze-reports)
        echo "$ANALYSIS_OUTPUT"

        eval "$ANALYSIS_OUTPUT"

        if [ "$TOTAL_MODELS" -gt 0 ]; then
          echo "**Total models tested:** $TOTAL_MODELS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Test Result | Count | Total | Rate |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED | $TOTAL_MODELS | ${PASSED_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Valid Format | $VALID_FORMAT | $TOTAL_MODELS | ${VALID_FORMAT_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED | $TOTAL_MODELS | ${FAILED_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Service Timeout | $TIMEOUT | $TOTAL_MODELS | ${TIMEOUT_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Service Error | $ERROR | $TOTAL_MODELS | ${ERROR_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Failed excludes service-timeout and service-error." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        else
          echo "No test reports found." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Comment on failure
      if: failure()
      run: |
        echo "# ❌ BioImage.IO Tests Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The daily BioImage.IO model testing workflow has failed." >> $GITHUB_STEP_SUMMARY
        echo "Please check the logs for more details." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Failed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

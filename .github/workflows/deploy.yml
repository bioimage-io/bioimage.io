name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Add permissions block
permissions:
  contents: write
  id-token: write
  pages: write      # Add pages permission
  deployments: write # Add deployments permission

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # pnpm must be installed before setup-node: setup-node@v5 enables
      # package-manager-cache by default and shells out to pnpm to prime the
      # cache, which fails ("pnpm not found") if pnpm isn't on PATH yet.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build
        env:
          CI: false

      - name: Download and extract chatbot static files
        run: |
          curl -LOk https://github.com/bioimage-io/bioimageio-chatbot/archive/refs/heads/main.zip
          unzip main.zip
          mkdir -p build/chat
          cp -r bioimageio-chatbot-main/bioimageio_chatbot/static/* build/chat/
          rm -rf main.zip bioimageio-chatbot-main

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        